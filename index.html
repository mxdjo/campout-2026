<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 African Eck Soul Adventure — Young Adult Camp Out</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #0ea5e9;
      --blue-dark:  #0369a1;
      --blue-light: #e0f2fe;
      --yellow:     #fde68a;
      --yellow-mid: #fbbf24;
      --white:      #ffffff;
      --text:       #1e3a5f;
      --muted:      #4a7aa7;
      --bg:         #f8fbff;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LANG BUTTON ────────────────────────────────── */
    #lang-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 999;
      background: var(--white);
      color: var(--blue-dark);
      border: 2px solid var(--blue);
      border-radius: 8px;
      padding: 7px 18px;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(14,165,233,0.18);
      transition: background 0.2s, color 0.2s;
    }
    #lang-btn:hover {
      background: var(--blue);
      color: var(--white);
    }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      text-align: center;
      padding: 64px 24px 56px;
      background: linear-gradient(160deg, var(--blue-dark) 0%, var(--blue) 100%);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      bottom: -60px; left: 50%;
      transform: translateX(-50%);
      width: 120%; height: 120px;
      background: var(--bg);
      border-radius: 50%;
    }
    .org-badge {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.35);
      margin-bottom: 18px;
    }
    .years-badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 5px 18px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    header h1 {
      font-size: clamp(1.6rem, 4.5vw, 3rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    header h1 .accent { color: var(--yellow); }
    header .event-sub {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: rgba(255,255,255,0.85);
      font-weight: 600;
      margin-bottom: 32px;
    }
    .meta-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .meta-pill {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(6px);
      color: #fff;
      padding: 10px 22px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── SECTION ────────────────────────────────────── */
    .section {
      max-width: 1000px;
      margin: 0 auto;
      padding: 64px 24px;
    }
    .section-title {
      text-align: center;
      margin-bottom: 40px;
    }
    .section-title h2 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      color: var(--blue-dark);
    }
    .section-title h2 .accent { color: var(--yellow-mid); }
    .section-title p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }
    .divider {
      width: 56px; height: 4px;
      background: linear-gradient(90deg, var(--blue), var(--yellow-mid));
      border-radius: 2px;
      margin: 12px auto 0;
    }

    /* ── FLYER ──────────────────────────────────────── */
    .flyer-section {
      background: linear-gradient(135deg, #fffde7 0%, var(--blue-light) 100%);
      border-top: 3px solid var(--yellow-mid);
      border-bottom: 3px solid var(--blue-light);
    }
    .flyer-inner {
      max-width: 520px;
      margin: 0 auto;
      padding: 56px 24px;
      text-align: center;
    }
    .flyer-inner h2 {
      font-size: clamp(1.2rem, 2.5vw, 1.6rem);
      font-weight: 800;
      color: var(--blue-dark);
      margin-bottom: 24px;
    }
    .flyer-inner h2 .accent { color: var(--yellow-mid); }
    .flyer-img {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(14,165,233,0.2), 0 2px 8px rgba(0,0,0,0.1);
      border: 3px solid var(--white);
      display: block;
    }

    /* ── VIDEOS ─────────────────────────────────────── */
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }
    .video-card {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(14,165,233,0.13);
      border: 2px solid var(--blue-light);
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .video-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(14,165,233,0.22);
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }
    .video-wrapper video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-info { padding: 20px 24px 24px; }
    .video-number {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 6px;
    }
    .video-info h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .video-info p  { font-size: 0.87rem; color: var(--muted); line-height: 1.55; }

    /* ── ACTIVITIES ─────────────────────────────────── */
    .activities-bg {
      background: linear-gradient(135deg, var(--blue-light) 0%, #fffde7 100%);
      border-top: 3px solid var(--yellow);
      border-bottom: 3px solid var(--blue-light);
    }
    .activities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .activity-item {
      background: var(--white);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(14,165,233,0.09);
      border-left: 4px solid var(--blue);
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--text);
    }
    .activity-item .em { font-size: 1.3rem; flex-shrink: 0; }

    /* ── FOOD ───────────────────────────────────────── */
    .food-section {
      background: var(--bg);
    }
    .food-intro {
      text-align: center;
      font-size: 1rem;
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }
    .food-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }
    .food-card {
      background: var(--white);
      border-radius: 14px;
      padding: 22px 20px;
      text-align: center;
      border: 2px solid var(--blue-light);
      box-shadow: 0 3px 16px rgba(14,165,233,0.09);
      transition: transform 0.2s, border-color 0.2s;
    }
    .food-card:hover { transform: translateY(-4px); border-color: var(--yellow-mid); }
    .food-icon { font-size: 2rem; margin-bottom: 10px; }
    .food-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 8px;
    }
    .food-price-ghs {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--blue-dark);
    }
    .food-price-usd {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 3px;
      min-height: 1.2em;
    }
    .food-closing {
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--blue-dark);
      background: var(--yellow);
      border-radius: 10px;
      padding: 14px 20px;
    }

    /* ── PACKAGES ───────────────────────────────────── */
    .packages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .pkg-card {
      background: var(--white);
      border-radius: 14px;
      padding: 24px 20px;
      text-align: center;
      border: 2px solid var(--blue-light);
      box-shadow: 0 3px 16px rgba(14,165,233,0.09);
      transition: transform 0.2s, border-color 0.2s;
    }
    .pkg-card:hover { transform: translateY(-4px); border-color: var(--yellow-mid); }
    .pkg-type {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 8px;
    }
    .pkg-price {
      font-size: 1.7rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 4px;
    }
    .pkg-price span { font-size: 1rem; font-weight: 600; color: var(--muted); }
    .pkg-usd {
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 1.2em;
    }
    .currency-note {
      background: var(--yellow);
      border-left: 4px solid var(--yellow-mid);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 0.87rem;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* ── INCLUDES & BRING ───────────────────────────── */
    .two-cols {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }
    .info-box {
      background: var(--white);
      border-radius: 16px;
      padding: 28px 28px 32px;
      box-shadow: 0 3px 20px rgba(14,165,233,0.1);
    }
    .info-box h3 {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--blue-dark);
      margin-bottom: 18px;
    }
    .info-box ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .info-box ul li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.45;
    }
    .info-box ul li::before {
      content: '✓';
      color: var(--blue);
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .info-box.yellow { border-top: 4px solid var(--yellow-mid); }
    .info-box.blue   { border-top: 4px solid var(--blue); }

    /* ── REGISTER ───────────────────────────────────── */
    .register-section {
      background: linear-gradient(135deg, var(--blue-light) 0%, #fffde7 100%);
      border-top: 3px solid var(--blue);
      border-bottom: 3px solid var(--yellow-mid);
      text-align: center;
    }
    .register-section h2 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      color: var(--blue-dark);
      margin-bottom: 12px;
    }
    .register-section h2 .accent { color: var(--yellow-mid); }
    .register-section p {
      color: var(--muted);
      font-size: 0.97rem;
      margin-bottom: 32px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    .register-btn {
      display: inline-block;
      padding: 16px 48px;
      background: var(--blue-dark);
      color: #fff;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 800;
      border-radius: 10px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(3,105,161,0.3);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .register-btn:hover {
      background: var(--blue);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(14,165,233,0.35);
    }

    /* ── CONTACT ─────────────────────────────────────── */
    .contact-bg { background: linear-gradient(160deg, var(--blue-dark) 0%, var(--blue) 100%); }
    .contact-bg .section-title h2 { color: #fff; }
    .contact-bg .section-title p  { color: rgba(255,255,255,0.7); }
    .contact-bg .divider { background: linear-gradient(90deg, var(--yellow), #fff); }
    .contacts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .contact-card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
      border-radius: 14px;
      padding: 20px 22px;
      text-align: center;
      color: #fff;
    }
    .contact-card .c-name { font-weight: 700; font-size: 1rem; margin-bottom: 6px; color: var(--yellow); }
    .contact-card a {
      color: #fff;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .contact-card a:hover { color: var(--yellow); }
    .wa-icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── FOOTER ─────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 28px 24px;
      background: var(--blue-dark);
      color: rgba(255,255,255,0.55);
      font-size: 0.82rem;
    }
    footer strong { color: var(--yellow); }
  </style>
</head>
<body>

  <button id="lang-btn">🇬🇧 EN</button>

  <!-- ░░ HEADER ░░ -->
  <header>
    <div class="org-badge" data-i18n="org_badge"></div>
    <br/>
    <div class="years-badge" data-i18n="years_badge"></div>
    <h1 data-i18n="h1"></h1>
    <p class="event-sub" data-i18n="event_sub"></p>
    <div class="meta-row">
      <div class="meta-pill" data-i18n="meta_date"></div>
      <div class="meta-pill" data-i18n="meta_location"></div>
    </div>
  </header>

  <!-- ░░ FLYER ░░ -->
  <div class="flyer-section">
    <div class="flyer-inner">
      <h2 data-i18n="flyer_title"></h2>
      <img class="flyer-img" src="images/flyer-campout.jpeg" alt="Camp Out Flyer" />
    </div>
  </div>

  <!-- ░░ VIDEOS ░░ -->
  <div class="section">
    <div class="section-title">
      <h2 data-i18n="venue_title"></h2>
      <p data-i18n="venue_sub"></p>
      <div class="divider"></div>
    </div>
    <div class="videos-grid">

      <div class="video-card">
        <div class="video-wrapper">
          <video controls preload="metadata">
            <source src="videos/video1.mp4" type="video/mp4" />
          </video>
        </div>
        <div class="video-info">
          <div class="video-number" data-i18n="vid1_num"></div>
          <h3 data-i18n="vid1_title"></h3>
          <p data-i18n="vid1_desc"></p>
        </div>
      </div>

      <div class="video-card">
        <div class="video-wrapper">
          <video controls preload="metadata">
            <source src="videos/room.mp4" type="video/mp4" />
          </video>
        </div>
        <div class="video-info">
          <div class="video-number" data-i18n="vid2_num"></div>
          <h3 data-i18n="vid2_title"></h3>
          <p data-i18n="vid2_desc"></p>
        </div>
      </div>

    </div>
  </div>

  <!-- ░░ ACTIVITIES ░░ -->
  <div class="activities-bg">
    <div class="section">
      <div class="section-title">
        <h2 data-i18n="act_title"></h2>
        <p data-i18n="act_sub"></p>
        <div class="divider"></div>
      </div>
      <div class="activities-grid">
        <div class="activity-item"><span class="em">🙏</span><span data-i18n="act1"></span></div>
        <div class="activity-item"><span class="em">🌳</span><span data-i18n="act2"></span></div>
        <div class="activity-item"><span class="em">🌍</span><span data-i18n="act3"></span></div>
        <div class="activity-item"><span class="em">⚽</span><span data-i18n="act4"></span></div>
        <div class="activity-item"><span class="em">💧</span><span data-i18n="act5"></span></div>
        <div class="activity-item"><span class="em">⛰️</span><span data-i18n="act6"></span></div>
      </div>
    </div>
  </div>

  <!-- ░░ PACKAGES ░░ -->
  <div class="section">
    <div class="section-title">
      <h2 data-i18n="pkg_title"></h2>
      <p data-i18n="pkg_sub"></p>
      <div class="divider"></div>
    </div>
    <div class="packages-grid">
      <div class="pkg-card">
        <div class="pkg-type" data-i18n="pkg_4"></div>
        <div class="pkg-price">GHS 1,000 <span data-i18n="per_person"></span></div>
        <div class="pkg-usd" data-ghs="1000">—</div>
      </div>
      <div class="pkg-card">
        <div class="pkg-type" data-i18n="pkg_3"></div>
        <div class="pkg-price">GHS 1,300 <span data-i18n="per_person"></span></div>
        <div class="pkg-usd" data-ghs="1300">—</div>
      </div>
      <div class="pkg-card">
        <div class="pkg-type" data-i18n="pkg_2"></div>
        <div class="pkg-price">GHS 2,000 <span data-i18n="per_person"></span></div>
        <div class="pkg-usd" data-ghs="2000">—</div>
      </div>
      <div class="pkg-card">
        <div class="pkg-type" data-i18n="pkg_1"></div>
        <div class="pkg-price">GHS 2,300 <span data-i18n="per_person"></span></div>
        <div class="pkg-usd" data-ghs="2300">—</div>
      </div>
      <div class="pkg-card">
        <div class="pkg-type" data-i18n="pkg_f3"></div>
        <div class="pkg-price">GHS 3,500 <span data-i18n="per_all"></span></div>
        <div class="pkg-usd" data-ghs="3500">—</div>
      </div>
      <div class="pkg-card">
        <div class="pkg-type" data-i18n="pkg_f4"></div>
        <div class="pkg-price">GHS 3,200 <span data-i18n="per_all"></span></div>
        <div class="pkg-usd" data-ghs="3200">—</div>
      </div>
    </div>

    <p class="currency-note" data-i18n="currency_note"></p>

    <div class="two-cols">
      <div class="info-box blue">
        <h3 data-i18n="includes_title"></h3>
        <ul>
          <li data-i18n="inc1"></li>
          <li data-i18n="inc2"></li>
          <li data-i18n="inc3"></li>
          <li data-i18n="inc4"></li>
          <li data-i18n="inc5"></li>
          <li data-i18n="inc6"></li>
          <li data-i18n="inc7"></li>

          <li data-i18n="br2"></li>

          <li data-i18n="br5"></li>
          <li data-i18n="br6"></li>
          <li data-i18n="br7"></li>
        </ul>
      </div>
    </div>
  </div>

  <!-- ░░ FOOD ░░ -->
  <div class="food-section">
    <div class="section">
      <div class="section-title">
        <h2 data-i18n="food_title"></h2>
        <p data-i18n="food_sub"></p>
        <div class="divider"></div>
      </div>
      <p class="food-intro" data-i18n="food_intro"></p>

          <div class="food-price-ghs">GHS 10</div>
          <div class="food-price-usd" data-ghs="10">—</div>
        </div>
        <div class="food-card">
          <div class="food-icon">🌽</div>
          <div class="food-name" data-i18n="food3_name"></div>
          <div class="food-price-ghs" data-i18n="food_from"></div>
          <div class="food-price-ghs">GHS 10</div>
          <div class="food-price-usd" data-ghs="10">—</div>
        </div>
        <div class="food-card">
          <div class="food-icon">🍚</div>
          <div class="food-name" data-i18n="food4_name"></div>
          <div class="food-price-ghs" data-i18n="food_from"></div>

      </div>
      <div class="food-closing" data-i18n="food_closing"></div>

  </div>

  <!-- ░░ REGISTER ░░ -->
  <div class="register-section">

    /* ── LANGUAGE ─────────────────────────────────── */
    let currentLang = localStorage.getItem('eck_lang') || 'en';
    let lastRate = null;

    function applyLang(lang) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (T[lang][key] !== undefined) el.innerHTML = T[lang][key];
      });
      document.getElementById('lang-btn').textContent = lang === 'en' ? '🇬🇧 EN' : '🇫🇷 FR';
      document.documentElement.lang = lang;
      currentLang = lang;
      localStorage.setItem('eck_lang', lang);
      if (lastRate) applyRate(lastRate); // restore rate values after innerHTML swap
    }

    document.getElementById('lang-btn').addEventListener('click', () => {
      applyLang(currentLang === 'en' ? 'fr' : 'en');
    });

    /* ── CURRENCY ─────────────────────────────────── */
    const FX_CACHE_KEY = 'eck_fx';
    const FX_TTL = 86400000; // 24 hours

    function applyRate(rate) {
      lastRate = rate;
      document.querySelectorAll('[data-ghs]').forEach(el => {
        const ghs = parseInt(el.getAttribute('data-ghs'), 10);
        const usd = Math.round(ghs * rate);
        el.textContent = `≈ $${usd.toLocaleString('en-US')}`;
      });
      const rateEl = document.getElementById('rate-display');
      if (rateEl) rateEl.textContent = (1 / rate).toFixed(4);
      const dateEl = document.getElementById('rate-date');
      if (dateEl) {
        dateEl.textContent = new Date().toLocaleDateString(
          currentLang === 'fr' ? 'fr-FR' : 'en-US',
          { day: 'numeric', month: 'long', year: 'numeric' }
        );
      }
    }

    async function loadRate() {
      try {
        const cached = JSON.parse(localStorage.getItem(FX_CACHE_KEY) || 'null');
        if (cached && Date.now() - cached.ts < FX_TTL) {
          applyRate(cached.rate);
          return;
        }
        const res = await fetch('https://api.exchangerate-api.com/v4/latest/GHS');
        const data = await res.json();
        const rate = data.rates.USD;
        localStorage.setItem(FX_CACHE_KEY, JSON.stringify({ rate, ts: Date.now() }));
        applyRate(rate);
      } catch {
        // API unavailable — keep "—" placeholders, static fallback
      }
    }

    /* ── INIT ─────────────────────────────────────── */
    applyLang(currentLang);
    loadRate();
